<!DOCTYPE html>
<html>

<head>
    <title>GitHub Actions S3 Deployment</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        
        .box {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>

</head>

<body>

    <h1>🚀 Deployed from GitHub Actions!</h1>

    <div class="box">

        <p>
            This website was deployed automatically using CI/CD.
        </p>

        <p id="time"></p>

    </div>

    <script>
        document.getElementById("time").innerHTML =
            "Deployment time: " + new Date();
    </script>

</body>

</html>
